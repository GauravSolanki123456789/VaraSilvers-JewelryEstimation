directories:
  output: build-out
  buildResources: build
appId: com.varasilvers.jewelry-estimation
productName: Vara Silvers
copyright: Copyright © ${author}
files:
  - filter:
      - main.js
      - electron.js
      - electron-env.js
      - server.js
      - config/**/*
      - middleware/**/*
      - public/**/*
      - migrations/**/*
      - migrate-sales-returns.js
      - package.json
      - '!public/uploads/**/*'
      - '!**/*.md'
      - '!kc-jewellers-web/**/*'
      - '!deploy/**/*'
      - '!scripts/**'
      - scripts/label-printer.js
      - '!dist/**/*'
      - '!.env'
extraResources: []
asar: true
asarUnpack:
  - '**/*.node'
  - node_modules/bcrypt/**
  - node_modules/sharp/**
  - node_modules/@img/**
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Vara Silvers
  include: build/installer.nsh
publish:
  - provider: github
    owner: GauravSolanki123456789
    repo: VaraSilvers-JewelryEstimation
    private: true
electronVersion: 33.4.0
